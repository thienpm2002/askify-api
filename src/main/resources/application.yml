spring:
  application:
    name: askify-api

  datasource:
    url: jdbc:mysql://localhost:3306/askify_db
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        "[format_sql]": true

server:
  port: 8080
  servlet:
    context-path: /api
