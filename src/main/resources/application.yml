spring:
  application:
    name: askify-api

  profiles:
    active: local

  datasource:
    url: jdbc:mysql://localhost:3306/askify_db
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        "[format_sql]": true

  data:
    redis:
      host: localhost
      port: 6379

  cache:
    type: redis

server:
  port: 8080
  servlet:
    context-path: /api/v1

app:
  upload:
    dir: uploads/avatars # Thư mục lưu trữ
    max-size: 2097152 # 2MB in bytes
    allowed-types: image/jpeg,image/png,image/webp
